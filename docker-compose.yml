version: '3.5'

services:
  selenoid:
    image: "aerokube/selenoid"
    platform: linux/amd64
    container_name: selenoid
    ports:
      - "4444:4444"
    networks:
      - selenoid
    volumes:
      - "./selenoid/browsers.json:/selenoid/browsers.json:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
    command: [ "-conf", "/selenoid/browsers.json", "-container-network", "selenoid" ]
    restart: unless-stopped

  selenoid-ui:
    image: "aerokube/selenoid-ui:latest"
    platform: linux/amd64
    container_name: selenoid-ui
    ports:
      - "8081:8080"
    networks:
      - selenoid
    command: [ "--selenoid-uri", "http://selenoid:4444" ]

  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test
    volumes:
      - ".:/app"
    depends_on:
      - selenoid
    networks:
      - selenoid
    command: [ "pytest", "--alluredir=allure-results" ]

networks:
  selenoid:
    name: selenoid